<!DOCTYPE html>
<html>
<head>
<title>Game Labirin Horror</title>
<style>
body{
  background:orange;
  color:white;
  text-align:center;
  font-family:Arial;
}

#maze{
  width:300px;
  height:300px;
  margin:auto;
  background:#222;
  position:relative;
  border:4px solid white;
}

.wall{
  position:absolute;
  background:red;
}

#player{
  width:20px;
  height:20px;
  background:lime;
  position:absolute;
  top:10px;
  left:10px;
}

#goal{
  width:20px;
  height:20px;
  background:yellow;
  position:absolute;
  bottom:10px;
  right:10px;
}

#ghost{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
}

#ghost img{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<h1>Labirin Horror</h1>
<p>Gunakan tombol panah untuk keluar dari labirin</p>

<div id="maze">

<div id="player"></div>
<div id="goal"></div>

<div class="wall" style="top:50px; left:0; width:200px; height:10px;"></div>
<div class="wall" style="top:120px; left:100px; width:200px; height:10px;"></div>
<div class="wall" style="top:200px; left:0; width:200px; height:10px;"></div>

</div>

<div id="ghost">
<img src="https://i.imgur.com/8yKQF7F.jpg">
<audio id="sound" src="https://www.myinstants.com/media/sounds/jumpscare.mp3"></audio>
</div>

<script>
let player = document.getElementById("player");
let goal = document.getElementById("goal");

let x = 10;
let y = 10;

document.addEventListener("keydown", move);

function move(e){

if(e.key=="ArrowRight") x+=10;
if(e.key=="ArrowLeft") x-=10;
if(e.key=="ArrowUp") y-=10;
if(e.key=="ArrowDown") y+=10;

player.style.left=x+"px";
player.style.top=y+"px";

checkWall();
checkWin();
}

function checkWall(){
let walls=document.querySelectorAll(".wall");

walls.forEach(w=>{u
let r=w.getBoundingClientRect();
let p=player.getBoundingClientRect();

if(!(p.right<r.left || p.left>r.right || p.bottom<r.top || p.top>r.bottom)){
jumpscare();
}
});
}

function checkWin(){
let g=goal.getBoundingClientRect();
let p=player.getBoundingClientRect();

if(!(p.right<g.left || p.left>g.right || p.bottom<g.top || p.top>g.bottom)){
alert("Kamu Berhasil Keluar!");
location.reload();
}
}

function jumpscare(){
document.getElementById("ghost").style.display="block";
document.getElementById("sound").play();
}
</script>

</body>
                 </html>
