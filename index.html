<!DOCTYPE html>
<html>
<head>
<title>Game Tebak-Tebakan Susah</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#222;
color:white;
}

#game{
margin-top:50px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🧠 Game Tebak-Tebakan Susah</h1>

<div id="game">
<p id="pertanyaan"></p>

<button onclick="jawab(0)" id="a"></button>
<button onclick="jawab(1)" id="b"></button>
<button onclick="jawab(2)" id="c"></button>
<button onclick="jawab(3)" id="d"></button>

<p id="hasil"></p>
</div>

<script>

let soal = [
{
t:"Saya punya kota tapi tidak ada rumah, saya punya sungai tapi tidak ada air. Apa saya?",
j:["Peta","Buku","Pulau","Komputer"],
b:0
},
{
t:"Semakin banyak diambil semakin besar. Apa itu?",
j:["Lubang","Uang","Air","Api"],
b:0
},
{
t:"Saya selalu naik tapi tidak pernah turun. Apa itu?",
j:["Umur","Air","Balon","Pohon"],
b:0
}
]

let nomor = 0

function tampil(){
document.getElementById("pertanyaan").innerHTML = soal[nomor].t
document.getElementById("a").innerHTML = soal[nomor].j[0]
document.getElementById("b").innerHTML = soal[nomor].j[1]
document.getElementById("c").innerHTML = soal[nomor].j[2]
document.getElementById("d").innerHTML = soal[nomor].j[3]
}

function jawab(pilihan){

if(pilihan == soal[nomor].b){
document.getElementById("hasil").innerHTML="✅ Benar!"
}else{
document.getElementById("hasil").innerHTML="❌ Salah!"
}

nomor++

if(nomor < soal.length){
setTimeout(function(){
document.getElementById("hasil").innerHTML=""
tampil()
},1000)
}else{
setTimeout(function(){
document.getElementById("game").innerHTML="<h2>Game selesai, gabut kan🎉</h2>"
},1000)
}

}

tampil()

</script>

</body>
  </html>
