<!DOCTYPE html>
<html>
<head>
<title>Game Jumpscare HP</title>

<style>
body{
text-align:center;
font-family:Arial;
background:black;
color:white;
}

#box{
width:200px;
height:200px;
background:green;
margin:50px auto;
line-height:200px;
font-size:20px;
border-radius:20px;
}

#ghost{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
}

#ghost img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>

<body>

<h1>Game Tap Aman</h1>
<p>Tap kotak hijau 5 kali untuk menang</p>

<div id="box">TAP</div>

<p>Skor: <span id="score">0</span></p>

<div id="ghost">
<img src="https://i.imgur.com/8yKQF7F.jpg">
<audio id="sound" src="https://www.myinstants.com/media/sounds/jumpscare.mp3"></audio>
</div>

<script>
let score = 0;

document.getElementById("box").addEventListener("click",tap);

document.body.addEventListener("click",function(e){
if(e.target.id!="box"){
jumpscare();
}
});

function tap(){
score++;
document.getElementById("score").innerText=score;

if(score>=5){
alert("Kamu Menang!");
location.reload();
}
}

function jumpscare(){
document.getElementById("ghost").style.display="block";
document.getElementById("sound").play();
}
</script>

</body>
</html>
