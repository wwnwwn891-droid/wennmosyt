<!DOCTYPE html>
<html>
<head>
    <title>Game Klik Cepat</title>
    <style>
        body { text-align:center; font-family:Arial; background:#222; color:white; }
        button { padding:20px; font-size:20px; margin-top:20px; }
    </style>
</head>
<body>

<h1>Game Klik Cepat 🎮</h1>
<p>Skor: <span id="score">0</span></p>
<button onclick="tambahSkor()">Klik Aku!</button>

<script>
let skor = 0;
function tambahSkor() {
    skor++;
    document.getElementById("score").innerText = skor;
}
</script>

</body>
</html>
